name: CI - API Flask

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'


      - run: python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - run: python -m pytest